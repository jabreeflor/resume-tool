<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
  <defs>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Window Chrome -->
  <rect width="900" height="620" rx="12" fill="#0a0a0a" filter="url(#shadow)"/>
  <rect width="900" height="38" rx="12" fill="#1a1a1a"/>
  <rect y="26" width="900" height="12" fill="#1a1a1a"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ef4444"/>
  <circle cx="40" cy="19" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="19" r="6" fill="#22c55e"/>
  <!-- URL bar -->
  <rect x="120" y="8" width="660" height="22" rx="6" fill="#0a0a0a"/>
  <text x="450" y="23" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#999" text-anchor="middle">localhost:3000</text>

  <!-- Header -->
  <text x="450" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="bold" fill="#e5e5e5" text-anchor="middle">&#x1F4C4; Resume Tool</text>
  <text x="450" y="118" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#999" text-anchor="middle">Paste your resume &#x2192; get AI-powered suggestions + a cleaned-up version</text>

  <!-- Label row -->
  <text x="80" y="160" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#999">Your Resume</text>
  <text x="820" y="160" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#999" text-anchor="end">847 chars</text>

  <!-- Textarea -->
  <rect x="80" y="170" width="740" height="320" rx="8" fill="#1a1a1a" stroke="#6366f1" stroke-width="1"/>
  <text x="96" y="196" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#e5e5e5" line-height="1.6">
    <tspan x="96" dy="0">JOHN DOE</tspan>
    <tspan x="96" dy="22">Software Engineer | San Francisco, CA</tspan>
    <tspan x="96" dy="22">john.doe@email.com | (555) 123-4567</tspan>
    <tspan x="96" dy="30">EXPERIENCE</tspan>
    <tspan x="96" dy="22">Senior Software Engineer — Acme Corp (2021-Present)</tspan>
    <tspan x="96" dy="22">- Worked on the backend team building APIs</tspan>
    <tspan x="96" dy="22">- Helped improve system performance</tspan>
    <tspan x="96" dy="22">- Was responsible for code reviews</tspan>
    <tspan x="96" dy="30">Software Engineer — StartupXYZ (2018-2021)</tspan>
    <tspan x="96" dy="22">- Built features for the web application</tspan>
    <tspan x="96" dy="22">- Participated in agile ceremonies</tspan>
    <tspan x="96" dy="22">- Did testing and debugging</tspan>
  </text>

  <!-- Buttons -->
  <rect x="80" y="510" width="170" height="42" rx="8" fill="url(#btnGrad)"/>
  <text x="165" y="536" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">&#x2728; Analyze Resume</text>

  <rect x="262" y="510" width="80" height="42" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="302" y="536" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="500" fill="#e5e5e5" text-anchor="middle">Clear</text>

  <!-- Footer accent line -->
  <rect x="80" y="580" width="740" height="1" fill="#2a2a2a"/>
</svg>