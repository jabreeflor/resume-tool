<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Window Chrome -->
  <rect width="900" height="700" rx="12" fill="#0a0a0a" filter="url(#shadow)"/>
  <rect width="900" height="38" rx="12" fill="#1a1a1a"/>
  <rect y="26" width="900" height="12" fill="#1a1a1a"/>
  <circle cx="20" cy="19" r="6" fill="#ef4444"/>
  <circle cx="40" cy="19" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="19" r="6" fill="#22c55e"/>
  <rect x="120" y="8" width="660" height="22" rx="6" fill="#0a0a0a"/>
  <text x="450" y="23" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#999" text-anchor="middle">localhost:3000</text>

  <!-- Tab bar -->
  <rect x="80" y="60" width="740" height="44" rx="8" fill="#141414"/>
  <!-- Active tab -->
  <rect x="86" y="66" width="180" height="32" rx="6" fill="#1a1a1a"/>
  <text x="176" y="87" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#e5e5e5" text-anchor="middle">&#x1F4A1; Suggestions (5)</text>
  <!-- Inactive tab -->
  <text x="350" y="87" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#999" text-anchor="middle">&#x1F4C4; Improved Version</text>

  <!-- Suggestion Card 1 -->
  <rect x="80" y="120" width="740" height="130" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <!-- HIGH badge -->
  <rect x="96" y="138" width="46" height="20" rx="4" fill="rgba(239,68,68,0.2)"/>
  <text x="119" y="152" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">HIGH</text>
  <text x="154" y="152" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#999">Impact</text>
  <text x="96" y="178" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#e5e5e5">Quantify Your Achievements</text>
  <text x="96" y="198" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#999">Replace vague descriptions with specific metrics and measurable outcomes.</text>
  <!-- Example box -->
  <rect x="96" y="212" width="708" height="28" rx="4" fill="#141414"/>
  <text x="108" y="231" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#6366f1">Example: </text>
  <text x="168" y="231" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#999">"Improved system performance" &#x2192; "Reduced API latency by 40%, handling 10K+ RPM"</text>

  <!-- Suggestion Card 2 -->
  <rect x="80" y="262" width="740" height="130" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="96" y="280" width="46" height="20" rx="4" fill="rgba(239,68,68,0.2)"/>
  <text x="119" y="294" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">HIGH</text>
  <text x="154" y="294" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#999">Language</text>
  <text x="96" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#e5e5e5">Use Strong Action Verbs</text>
  <text x="96" y="340" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#999">Start bullet points with powerful action verbs instead of passive language.</text>
  <rect x="96" y="354" width="708" height="28" rx="4" fill="#141414"/>
  <text x="108" y="373" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#6366f1">Example: </text>
  <text x="168" y="373" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#999">"Was responsible for code reviews" &#x2192; "Led code reviews for a team of 8 engineers"</text>

  <!-- Suggestion Card 3 -->
  <rect x="80" y="404" width="740" height="110" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="96" y="422" width="64" height="20" rx="4" fill="rgba(245,158,11,0.2)"/>
  <text x="128" y="436" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">MEDIUM</text>
  <text x="172" y="436" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#999">ATS</text>
  <text x="96" y="462" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#e5e5e5">Add Keywords for ATS Optimization</text>
  <text x="96" y="482" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#999">Include industry-relevant keywords that ATS systems scan for in your field.</text>
  <rect x="96" y="494" width="708" height="10" rx="4" fill="transparent"/>

  <!-- Suggestion Card 4 -->
  <rect x="80" y="526" width="740" height="110" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="96" y="544" width="64" height="20" rx="4" fill="rgba(245,158,11,0.2)"/>
  <text x="128" y="558" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">MEDIUM</text>
  <text x="172" y="558" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#999">Formatting</text>
  <text x="96" y="584" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#e5e5e5">Consistent Date Formatting</text>
  <text x="96" y="604" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#999">Standardize date formats across all positions for a polished presentation.</text>

  <!-- Scroll indicator -->
  <rect x="868" y="120" width="4" height="200" rx="2" fill="#2a2a2a"/>
  <rect x="868" y="120" width="4" height="80" rx="2" fill="#6366f1" opacity="0.6"/>

  <!-- Bottom fade -->
  <rect x="0" y="660" width="900" height="40" rx="0" fill="#0a0a0a"/>
</svg>